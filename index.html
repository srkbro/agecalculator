<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Age Calculator</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

</head>

<body>

<div class="bg-glow glow1"></div>
<div class="bg-glow glow2"></div>

<div class="app">

<h1 class="title">AGE <span>CALCULATOR</span></h1>

<div class="input-box">
<label>Select Birth Date</label>
<input type="date" id="date-input">
</div>

<button id="calculateBtn" class="neon-btn">CALCULATE</button>

<div class="result-container">

<div class="card">
<div id="years" class="number">--</div>
<div class="label">YEARS</div>
</div>

<div class="card">
<div id="months" class="number">--</div>
<div class="label">MONTHS</div>
</div>

<div class="card">
<div id="weeks" class="number">--</div>
<div class="label">WEEKS</div>
</div>

<div class="card">
<div id="days" class="number">--</div>
<div class="label">DAYS</div>
</div>

<div class="card">
<div id="hours" class="number">--</div>
<div class="label">HOURS</div>
</div>

<div class="card">
<div id="minutes" class="number">--</div>
<div class="label">MINUTES</div>
</div>

<div class="card">
<div id="seconds" class="number">--</div>
<div class="label">SECONDS</div>
</div>

</div>

<div class="extra-section">

<div class="birthday-box">
<h3>🎂 Next Birthday In</h3>
<div id="nextBirthday">-- Days</div>
</div>

<div class="funfacts-box">
<h3>🧠 Fun Facts</h3>
<p id="sleepFact"></p>
<p id="heartbeatFact"></p>
<p id="blinkFact"></p>
</div>

<div class="planet-box">
<h3>🪐 Age On Other Planets</h3>
<p id="mercury"></p>
<p id="venus"></p>
<p id="mars"></p>
<p id="jupiter"></p>
</div>

<button onclick="shareResult()" class="share-btn">Share Result</button>

</div>

</div>

<footer class="footer">

<p>If you like my ideas, please follow me on Facebook</p>

<a href="https://www.facebook.com/share/1L9KjPuLyu/?mibextid=wwXIfr" target="_blank">

<img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" width="28">

</a>

</footer>

<script src="script.js"></script>

</body>
</html>
